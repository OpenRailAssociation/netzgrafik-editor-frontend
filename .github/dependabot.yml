version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    groups:
      angular:
        patterns:
          - "@angular/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/js"
      patch:
        update-types:
          - "patch"
    ignore:
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "angular-eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@angular-devkit/build-angular"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sbb-esta/angular"
        update-types: ["version-update:semver-major"]
      - dependency-name: "angular-oauth2-oidc"
        update-types: ["version-update:semver-major"]
      - dependency-name: "angular-server-side-configuration"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 100
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "area:ci"
    open-pull-requests-limit: 100
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 100
